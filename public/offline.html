<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071014">
  <title>往哲荣耀 · 暂时离线</title>
  <style>
    *{box-sizing:border-box}body{min-height:100dvh;margin:0;display:grid;place-items:center;padding:max(24px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));color:#dce6dc;background:radial-gradient(circle at 50% 25%,#173b40,transparent 38%),#071014;font-family:Arial,"Microsoft Yahei",sans-serif;text-align:center}.card{width:min(440px,100%);padding:28px;border:1px solid rgba(224,193,111,.55);background:rgba(6,18,23,.9);box-shadow:0 20px 70px rgba(0,0,0,.46)}.sigil{width:64px;height:64px;margin:auto;display:grid;place-items:center;border:2px solid #d8b962;color:#edd27f;font:34px Georgia;transform:rotate(45deg)}.sigil span{transform:rotate(-45deg)}h1{margin:26px 0 10px;color:#efd68c;font:600 28px Georgia,"Songti SC",serif}p{margin:0;color:#9eb4ac;font-size:14px;line-height:1.7}button{min-width:150px;min-height:46px;margin-top:22px;border:1px solid #d3b45e;background:#8a632e;color:#fff0bd;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="sigil" aria-hidden="true"><span>◇</span></div>
    <h1>思想暂时离线</h1>
    <p>当前版本不会缓存游戏代码，以免旧版本影响存档兼容。恢复网络后即可继续稳定进度。</p>
    <button type="button" onclick="location.reload()">重新连接</button>
  </main>
</body>
</html>
